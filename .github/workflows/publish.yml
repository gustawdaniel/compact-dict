name: Publish to crates.io

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Check if already published
        id: check
        shell: bash
        run: |
          # Use cargo metadata to reliably get the version of the crate
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "Current package version from Cargo.toml: $VERSION"
          
          # Check if this exact version exists on crates.io. A User-Agent is required by crates.io API to prevent 403 Forbidden.
          HTTP_STATUS=$(curl -s -A "compact-dict-ci" -o /dev/null -w "%{http_code}" https://crates.io/api/v1/crates/compact-dict/$VERSION)
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Version $VERSION is already published to crates.io. Skipping publish step."
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is not published yet. Will proceed with publishing."
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to crates.io
        if: steps.check.outputs.published == 'false'
        # To make this work, you need to add CRATES_IO_TOKEN secret in your GitHub repository
        # Go to GitHub Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish
